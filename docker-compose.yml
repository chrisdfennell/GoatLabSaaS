services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: goatlab-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    volumes:
      - goatlab-mailpit:/data
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: goatlab-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD must be set in .env}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - goatlab-mssql:/var/opt/mssql
      - goatlab-backups:/var/opt/mssql/backup
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  goatlab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goatlab
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8090}:8080"
      - "${APP_HTTPS_PORT:-8443}:8443"
    volumes:
      - goatlab-media:/app/media
      - goatlab-backups:/app/backups
      - ./certs:/app/certs:ro
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080;https://+:8443"
      Kestrel__Certificates__Default__Path: "/app/certs/app.pfx"
      Kestrel__Certificates__Default__Password: "${CERT_PASSWORD:-changeit}"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GoatLab;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=True;"
      GoogleMaps__ApiKey: "${GOOGLE_MAPS_API_KEY:-}"
      Backup__AppPath: "/app/backups"
      Backup__SqlServerPath: "/var/opt/mssql/backup"
      Smtp__Host: "${SMTP_HOST:-}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromAddress: "${SMTP_FROM_ADDRESS:-}"
      Smtp__FromName: "${SMTP_FROM_NAME:-GoatLab}"
      Smtp__UseSsl: "${SMTP_USE_SSL:-true}"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY:-}"
      Stripe__PublishableKey: "${STRIPE_PUBLISHABLE_KEY:-}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET:-}"
      Stripe__FarmPriceId: "${STRIPE_FARM_PRICE_ID:-}"
      Stripe__DairyPriceId: "${STRIPE_DAIRY_PRICE_ID:-}"
      Stripe__TrialDays: "${STRIPE_TRIAL_DAYS:-14}"
      Sentry__Dsn: "${SENTRY_DSN:-}"
      Sentry__TracesSampleRate: "${SENTRY_TRACES_SAMPLE_RATE:-0.0}"
      Backup__Offsite__Enabled: "${BACKUP_OFFSITE_ENABLED:-false}"
      Backup__Offsite__Endpoint: "${BACKUP_OFFSITE_ENDPOINT:-}"
      Backup__Offsite__Region: "${BACKUP_OFFSITE_REGION:-us-east-1}"
      Backup__Offsite__AccessKey: "${BACKUP_OFFSITE_ACCESS_KEY:-}"
      Backup__Offsite__SecretKey: "${BACKUP_OFFSITE_SECRET_KEY:-}"
      Backup__Offsite__Bucket: "${BACKUP_OFFSITE_BUCKET:-}"
      Backup__Offsite__Prefix: "${BACKUP_OFFSITE_PREFIX:-goatlab/db/}"
      Backup__Offsite__RetentionDays: "${BACKUP_OFFSITE_RETENTION_DAYS:-30}"
      WebAuthn__RpId: "${WEBAUTHN_RP_ID:-localhost}"
      WebAuthn__Origins__0: "${WEBAUTHN_ORIGIN:-http://localhost:8095}"
      Push__VapidPublicKey: "${PUSH_VAPID_PUBLIC_KEY:-}"
      Push__VapidPrivateKey: "${PUSH_VAPID_PRIVATE_KEY:-}"
      Push__Subject: "${PUSH_SUBJECT:-mailto:admin@goatlab.local}"
      Identity__RequireConfirmedEmail: "${IDENTITY_REQUIRE_CONFIRMED_EMAIL:-false}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  goatlab-mssql:
  goatlab-media:
  goatlab-backups:
  goatlab-mailpit:
