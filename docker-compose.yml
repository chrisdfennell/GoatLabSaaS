services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: goatlab-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD must be set in .env}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - goatlab-mssql:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  goatlab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goatlab
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8090}:8080"
    volumes:
      - goatlab-media:/app/media
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GoatLab;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=True;"
      GoogleMaps__ApiKey: "${GOOGLE_MAPS_API_KEY:-}"
    restart: unless-stopped

volumes:
  goatlab-mssql:
  goatlab-media:
